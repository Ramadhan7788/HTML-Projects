<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>
<body>

    <header>
        <p>Acme Support</p>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="help.html">Help</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <h1>Contact Us</h1>
        <p>Send us a message and we will get back to you as soon as possible.</p>

        <form action="https://example.com/contact" method="post">
            <div>
                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="full-name" required>
            </div>
            
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="subject">Subject:</label>
                <select id="subject" name="subject" required>
                    <option value="" disabled selected>Select a subject</option>
                    <option value="billing">Billing</option>
                    <option value="technical">Technical Support</option>
                    <option value="feedback">Feedback</option>
                </select>
            </div>

            <div>
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" minlength="10" required></textarea>
            </div>
        
            
            <div>
                <fieldset>
                    <legend>How did you hear about us?</legend>
                    <div>
                        <input type="radio" id="source-search" name="source" value="search">
                        <label for="source-search">Search</label>
                    </div>
                    <div>
                        <input type="radio" id="source-friend" name="source" value="friend">
                        <label for="source-friend">Friend</label>
                    </div>
                    <div>
                        <input type="radio" id="source-social" name="source" value="social">
                        <label for="source-social">Social Media</label>
                    </div>
                </fieldset>
            </div>

            <div>
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe">Subscribe to our newsletter</label>
            </div>

            <div>
                <button type="submit">Submit</button>
            </div>
        </form>

    </main>

    <footer>
        <p>&copy; Acme Support. All rights reserved.</p>
    </footer>

</body>
</html>
