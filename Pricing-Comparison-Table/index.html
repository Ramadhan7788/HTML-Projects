<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pricing Comparison Table</title>

</head>
<body>
    <header>
        <h1>Acme Plan</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <table>
            <caption>Plan Comparison</caption>

            <thead>
                <tr>
                    <th scope="col">Plan</th>
                    <th scope="col">Storage</th>
                    <th scope="col">Projects</th>
                    <th scope="col">Support</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td scope="row">Free</td>
                    <td>5 GB</td>
                    <td>3</td>
                    <td>Email</td>
                </tr>

                <tr>
                    <td scope="row">Pro</td>
                    <td>100 GB</td>
                    <td>25</td>
                    <td>Priority Email</td>
                </tr>

                <tr>
                    <td scope="row">Business</td>
                    <td>1 TB</td>
                    <td>Unlimited</td>
                    <td>24/7 Phone & Email</td> 
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="4">All plans include SSL and daily backups.</td>
                </tr>
            </tfoot>
        </table>
    </main>
    <footer>
        <p>&copy; 2024 Acme Inc. All rights reserved.</p>
    </footer>
</body>
</html>
